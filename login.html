<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background:#0d0f1a;
      color:white;
      font-family:sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }
    .box {
      background:#131629;
      padding:30px;
      border-radius:10px;
      width:300px;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }
    h2 {
      text-align:center;
      margin-bottom:20px;
    }
    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:5px;
    }
    button {
      width:100%;
      padding:10px;
      background:#7c5cfc;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      margin-top:10px;
    }
    button:hover {
      opacity:0.9;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button onclick="login()">Login</button>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("auth", "true");
      window.location.href = "index.html";
    } else {
      alert("Invalid login");
    }

  } catch (error) {
    alert("Server not running!");
    console.error(error);
  }
}
</script>

</body>
</html>
